name: UTM Conformance

on:
  pull_request:
    paths:
      - "backend/**"
      - "docs/**"
      - "profiles/**"
      - ".github/workflows/utm-conformance.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - "docs/**"
      - "profiles/**"
      - ".github/workflows/utm-conformance.yml"

jobs:
  utm-conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run UTM conformance suite (blocking)
        run: backend/test/run_utm_conformance_ci.sh
